spring:
  application:
    name: exitusro-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    # Supabase pooled connection (transaction mode, port 6543) is recommended for app workloads.
    # Get this from: Supabase Dashboard -> Project Settings -> Database -> Connection string -> URI
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Supabase pooler in transaction mode does not support prepared statements
      data-source-properties:
        prepareThreshold: 0

  jpa:
    open-in-view: false
    hibernate:
      # Schema already exists (managed by Supabase migrations). Do NOT auto-create.
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        jdbc:
          time_zone: UTC
          lob:
            non_contextual_creation: true
        format_sql: false
    show-sql: false

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# === ExitusRO custom config ===
exitusro:
  cors:
    # Add your Vite dev server and prod domain here, comma-separated
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  supabase:
    url: ${SUPABASE_URL:}
    # JWT secret used to verify tokens issued by Supabase Auth
    # Found in: Dashboard -> Project Settings -> API -> JWT Settings -> JWT Secret
    jwt-secret: ${SUPABASE_JWT_SECRET:}
    # Service-role key (server-side only, NEVER expose to frontend)
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    storage-bucket: ${SUPABASE_STORAGE_BUCKET:case-documents}
  resend:
    api-key: ${RESEND_API_KEY:}
    from: ${RESEND_FROM:ExitusRO <no-reply@exitusro.ro>}

springdoc:
  swagger-ui:
    path: /swagger-ui
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    ro.exitusro: DEBUG
    org.hibernate.SQL: WARN
