server:
  port: 8080

spring:
  application:
    name: exitusro-backend

  datasource:
    url: jdbc:h2:mem:exitusro;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    # Base64-encoded 256-bit secret. Change for production.
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXBsZWFzZS1leGl0dXNyby1zZWNyZXQta2V5LW11c3QtYmUtMjU2LWJpdHM=}
    expiration-minutes: 240
    cookie-name: exitusro_jwt
    auth-present-cookie: auth_present
    secure: false
    same-site: Lax

  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173

logging:
  level:
    org.springframework.security: INFO
    ro.exitusro: DEBUG
